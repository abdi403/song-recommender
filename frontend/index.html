<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundwave — Music Discovery</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2.5' y='9' width='4.5' height='13' rx='2.25' fill='%231d78e2'/%3E%3Crect x='9.75' y='2' width='4.5' height='20' rx='2.25' fill='%231d78e2'/%3E%3Crect x='17' y='12' width='4.5' height='10' rx='2.25' fill='%231d78e2'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="app">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24">
          <rect x="2.5" y="9" width="4.5" height="13" rx="2.25" />
          <rect x="9.75" y="2" width="4.5" height="20" rx="2.25" />
          <rect x="17" y="12" width="4.5" height="10" rx="2.25" />
        </svg>
        Soundwave
      </div>
      <div class="nav-section">
        <button class="nav-item active" data-page="home">
          <svg viewBox="0 0 24 24">
            <path d="M12.5 3.247a1 1 0 0 0-1 0L4 7.577V21h5v-6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v6h5V7.577l-7.5-4.33z" />
          </svg>
          Home
        </button>
        <button class="nav-item" data-page="search">
          <svg viewBox="0 0 24 24">
            <path
              d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279s7.407 3.273 7.407 7.279-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z" />
          </svg>
          Search
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="nav-section">
        <div
          style="padding:0 12px; color:var(--text-subdued); font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:4px;">
          Tools</div>
        <button class="nav-item" data-page="add">
          <svg viewBox="0 0 24 24">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4z" />
          </svg>
          Add Song
        </button>
      </div>
      <div class="sidebar-card">
        <div class="status-row">
          <span class="status-dot" id="apiStatusDot"></span>
          <strong>API Status</strong>
        </div>
        <span id="apiStatusText">Checking…</span>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-nav">
          <button class="circle" title="Back">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff">
              <path d="M15.5 3.5L7 12l8.5 8.5 1.5-1.5L10 12l7-7z" />
            </svg>
          </button>
          <button class="circle" title="Forward">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff">
              <path d="M8.5 3.5L17 12l-8.5 8.5L7 19l7-7-7-7z" />
            </svg>
          </button>
        </div>
        <div class="searchbar">
          <svg viewBox="0 0 24 24">
            <path
              d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279s7.407 3.273 7.407 7.279-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z" />
          </svg>
          <input type="text" id="topSearchInput" placeholder="What do you want to play?">
        </div>
        <div style="width:80px;"></div>
      </div>

      <div class="content">

        <!-- HOME PAGE -->
        <section class="page active" id="page-home">
          <h1 class="page-title">Good evening</h1>
          <div class="stat-strip" id="statStrip"></div>
          <div class="section-header">
            <h2 class="section-title">All Songs</h2>
            <button class="btn btn-secondary" id="refreshSongsBtn">Refresh</button>
          </div>
          <div id="homeSongsContainer">
            <div class="loading">
              <div class="spinner"></div> Loading songs…
            </div>
          </div>
        </section>

        <!-- SEARCH PAGE -->
        <section class="page" id="page-search">
          <h1 class="page-title">Search</h1>
          <div class="searchbar" style="max-width:480px; margin-bottom:24px;">
            <svg viewBox="0 0 24 24">
              <path
                d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279s7.407 3.273 7.407 7.279-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z" />
            </svg>
            <input type="text" id="searchPageInput" placeholder="Search by song title or artist...">
          </div>
          <div id="searchResults" style="margin-top:20px;">
            <div class="empty-state">
              <svg viewBox="0 0 24 24">
                <path
                  d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279s7.407 3.273 7.407 7.279-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z" />
              </svg>
              <p>Start typing to search songs by title or artist</p>
            </div>
          </div>
        </section>

        <!-- ADD SONG PAGE -->
        <section class="page" id="page-add">
          <h1 class="page-title">Add New Song</h1>
          <p style="color:var(--text-subdued); margin-bottom:8px;">Add a new song to the database.</p>
          <div class="panel">
            <div class="form-grid">
              <div class="form-group">
                <label for="addTitle">Title</label>
                <input type="text" id="addTitle" placeholder="Song title">
              </div>
              <div class="form-group">
                <label for="addArtist">Artist</label>
                <input type="text" id="addArtist" placeholder="Artist name">
              </div>
              <div class="form-group">
                <label for="addAlbum">Album</label>
                <input type="text" id="addAlbum" placeholder="Album name">
              </div>
              <div class="form-group">
                <label for="addGenre">Genre</label>
                <select id="addGenre">
                  <option>Pop</option>
                  <option>Hip-Hop</option>
                  <option>Rock</option>
                  <option>Electronic</option>
                  <option>R&B</option>
                  <option>Jazz</option>
                  <option>Classical</option>
                  <option>Country</option>
                  <option>Afrobeat</option>
                </select>
              </div>
              <div class="form-group">
                <label for="addDuration">Duration (seconds)</label>
                <input type="number" id="addDuration" placeholder="210" min="1">
              </div>
              <div class="form-group">
                <label for="addExplicit">Explicit</label>
                <label class="checkbox-row">
                  <input type="checkbox" id="addExplicit">
                  <span>Contains explicit content</span>
                </label>
              </div>
              <div class="form-group full" id="addAudioFeatures"></div>
            </div>
            <div class="btn-row">
              <button class="btn btn-primary" id="addSongBtn">Add Song to Database</button>
              <button class="btn btn-secondary" id="addSongClearBtn">Clear Form</button>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- SONG DETAIL POPUP (opened by clicking a song on Home or Search) -->
  <div class="modal-overlay" id="songModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-song-title" id="modalSongTitle">—</div>
          <div class="modal-song-artist" id="modalSongArtist">—</div>
        </div>
        <button class="modal-close" id="modalCloseBtn" title="Close">&times;</button>
      </div>
      <div class="modal-tabs-wrapper">
        <button class="modal-tab-arrow" id="modalTabsLeft" type="button" aria-label="Scroll tabs left">&#8249;</button>
        <div class="modal-tabs" id="modalTabsScroll">
          <button class="modal-tab active" data-tab="spotify">Spotify</button>
          <button class="modal-tab" data-tab="youtube">YouTube</button>
          <button class="modal-tab" data-tab="recommend">Recommendations</button>
          <button class="modal-tab" data-tab="features">Song Features</button>
          <button class="modal-tab" data-tab="predict">Predict Features</button>
        </div>
        <button class="modal-tab-arrow" id="modalTabsRight" type="button" aria-label="Scroll tabs right">&#8250;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!--
    Scripts are loaded in dependency order (no bundler / build step, so this
    order matters — see frontend/README.md "Load order" section for why).
  -->
  <script src="js/env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/apiStatus.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/featureForm.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/home.js"></script>
  <script src="js/search.js"></script>
  <script src="js/songModal.js"></script>
  <!--
    Spotify's official iFrame API (used by the Spotify tab in songModal.js).
    Loaded AFTER songModal.js on purpose: songModal.js defines
    window.onSpotifyIframeApiReady, which this script calls once it loads —
    that function must exist first, or the callback would never fire.
  -->
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  <script src="js/addSong.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
